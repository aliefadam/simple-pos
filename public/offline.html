<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Kasirku POS</title>
    <meta name="theme-color" content="#4f46e5" />
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(79, 70, 229, 0.24), transparent 34%),
          #020617;
        color: #f8fafc;
        padding: 24px;
      }
      .card {
        width: min(100%, 420px);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(20px);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .brand img {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        object-fit: cover;
      }
      .status {
        margin-top: 22px;
        border-radius: 20px;
        border: 1px solid rgba(248, 113, 113, 0.24);
        background: rgba(239, 68, 68, 0.12);
        padding: 16px;
      }
      h1,
      p {
        margin: 0;
      }
      .hint {
        margin-top: 16px;
        color: rgba(226, 232, 240, 0.9);
        line-height: 1.65;
        font-size: 14px;
      }
      .button {
        margin-top: 24px;
        width: 100%;
        height: 44px;
        border: 0;
        border-radius: 16px;
        background: white;
        color: #0f172a;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="/logo.png" alt="Kasirku POS logo" />
        <div>
          <h1 style="font-size: 20px">Kasirku POS</h1>
          <p style="margin-top: 4px; color: rgba(226, 232, 240, 0.78)">
            Mode offline
          </p>
        </div>
      </div>

      <section class="status">
        <p style="font-weight: 700">Tidak ada koneksi internet</p>
        <p class="hint">
          Aplikasi berhasil dibuka dari cache PWA, tetapi data terbaru belum bisa
          disinkronkan sekarang.
        </p>
      </section>

      <div class="hint">
        Sambungkan internet atau buka ulang aplikasi saat koneksi kembali
        tersedia.
      </div>

      <button class="button" onclick="window.location.reload()">
        Coba Lagi
      </button>
    </main>
  </body>
</html>
